plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.compassmobileapp'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.compassmobileapp"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
